# =============================================================================
# .github/workflows/ci.yml — GitHub Actions CI pipeline
# =============================================================================
# Runs linting and tests on every push and pull request.
#
# STEPS TO COMPLETE (later):
# 1. Add a linting step (ruff or flake8).
# 2. Add a type-checking step (mypy or pyright).
# 3. Add integration tests with a live Anthropic key (as a secret).
# =============================================================================

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest

      - name: Run tests
        env:
          CALENDAR_MODE: mock
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: pytest -v
