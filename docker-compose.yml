# =============================================================================
# Calendar Planning Agent — Local Docker Compose
# =============================================================================
# Usage:  docker compose up --build

version: "3.9"

services:
  app:
    build: .
    ports:
      - "8501:8501"
    env_file:
      - .env
    volumes:
      # Mount source for live-reload during development
      - ./src:/app/src
      - ./config:/app/config
